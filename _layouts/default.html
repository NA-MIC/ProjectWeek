<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

{% seo %}
    <link rel="shortcut icon" href="{{ "/assets/favicons/favicon.ico" | relative_url}}">
    <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">

  <style>
    .lightbox-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.9); z-index: 9999;
      align-items: center; justify-content: center; cursor: zoom-out;
    }
    .lightbox-overlay.active { display: flex; }
    .lightbox-overlay img { max-width: 95vw; max-height: 95vh; object-fit: contain; }
  </style>

<!-- for github edit ribbon; main include is in `assets/css/style.scss` -->
<!--[if lt IE 9]>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-fork-ribbon-css/0.2.0/gh-fork-ribbon.ie.min.css" />
<![endif]-->

  </head>
  <body>

    <a class="github-fork-ribbon" href="{{site.github.repository_url}}/edit/master/{{page.path}}" data-ribbon="Edit this page" title="Edit this page">Edit this page</a>

    <div class="container-lg px-3 my-5 markdown-body">
      {% if site.title and site.title != page.title %}
      <h1><img align="center" height="60" style="margin:0px 20px 0px 0px" src="{{ "/assets/na-mic-logo.png" | relative_url}}"><a href="{{ "/" | absolute_url }}">{{ site.title }}</a></h1>
      {% endif %}

      {{ content }}

    </div>
    <div class="lightbox-overlay" id="lightbox">
      <img id="lightbox-img" src="" alt="">
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/anchor-js/4.1.0/anchor.min.js" integrity="sha256-lZaRhKri35AyJSypXXs4o6OPFTbTmUoltBbDCbdzegg=" crossorigin="anonymous"></script>
    <script>anchors.add();</script>
    <script>
      (function () {
        var overlay = document.getElementById('lightbox');
        var lbImg   = document.getElementById('lightbox-img');

        document.querySelectorAll('.markdown-body img').forEach(function (img) {
          img.style.cursor = 'zoom-in';
          img.addEventListener('dblclick', function () {
            lbImg.src = img.src;
            lbImg.alt = img.alt;
            overlay.classList.add('active');
          });
        });

        overlay.addEventListener('click', function () { overlay.classList.remove('active'); });
        document.addEventListener('keydown', function (e) {
          if (e.key === 'Escape') overlay.classList.remove('active');
        });
      })();
    </script>
    <script>
      (function () {
        var URL_RE = /(https?:\/\/[^\s<>"')\]]+)/g;
        var SKIP = { A: 1, CODE: 1, PRE: 1, SCRIPT: 1, STYLE: 1 };

        function walk(node) {
          if (node.nodeType === 3) {
            var text = node.nodeValue;
            URL_RE.lastIndex = 0;
            if (!URL_RE.test(text)) return;
            URL_RE.lastIndex = 0;
            var frag = document.createDocumentFragment();
            var last = 0, m;
            while ((m = URL_RE.exec(text)) !== null) {
              frag.appendChild(document.createTextNode(text.slice(last, m.index)));
              var a = document.createElement('a');
              a.href = m[0];
              a.textContent = m[0];
              frag.appendChild(a);
              last = m.index + m[0].length;
            }
            frag.appendChild(document.createTextNode(text.slice(last)));
            node.parentNode.replaceChild(frag, node);
          } else if (node.nodeType === 1 && !SKIP[node.tagName]) {
            Array.from(node.childNodes).forEach(walk);
          }
        }

        document.querySelectorAll('.markdown-body').forEach(walk);
      })();
    </script>
    {% if site.google_analytics %}
    <script>
      (function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
      (i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
      m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
      })(window,document,'script','//www.google-analytics.com/analytics.js','ga');
      ga('create', '{{ site.google_analytics }}', 'auto');
      ga('send', 'pageview');
    </script>
    {% endif %}
  </body>
</html>
